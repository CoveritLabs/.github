name: Docker build and push

on:
  workflow_call:
    inputs:
      image-name:
        description: "Image name without registry prefix, e.g. coveritlabs/coverit-api"
        required: true
        type: string
      dockerfile:
        description: "Path to the Dockerfile"
        required: false
        type: string
        default: "./Dockerfile"
      context:
        description: "Docker build context"
        required: false
        type: string
        default: "."
      build-args:
        description: "Newline-separated list of build-time variables (ARG=value)"
        required: false
        type: string
        default: ""

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ inputs.image-name }}
          tags: |
            # :dev on develop pushes
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/develop' }}
            # :latest on main pushes
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # :1.2.3 on semver tags
            type=semver,pattern={{version}}
            # :1.2 on semver tags
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            npm_token=${{ secrets.GITHUB_TOKEN }}
